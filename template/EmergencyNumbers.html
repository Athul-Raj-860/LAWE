<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Numbers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
     <style>
        body {
            background-color: #000000;
            font-family: 'Arial', sans-serif;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
            color: aqua;
            font-size: 2.5em;
        }
        .row {
            margin-top: 30px;
        }
        .col-sm-4 {
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 20px;
            font-size: 1.2em;
            border-radius: 10px;
            border: none;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #4CAF50;
            color: white;
            transform: scale(1.05);
        }
        button:focus {
            outline: none;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>
<body>

<h1>Emergency Numbers</h1>
<div class="row">
    <div class="col-sm-4">
        <button type="button">Police<br>100</button><br>
    </div>

    <div class="col-sm-4">
        <button type="button">Fire<br>101</button><br>
    </div>

    <div class="col-sm-4">
        <button type="button">Ambulance<br>102</button><br>
    </div>

    <div class="col-sm-4">
        <button type="button">Women<br>1091</button><br>
    </div>

    <div class="col-sm-4">
        <button type="button">Children<br>1098</button><br>
    </div>

    <div class="col-sm-4">
        <button type="button">Pink Police<br>1515</button><br>
    </div>

    <div class="col-sm-4">
        <button type="button">Road-Accident<br>108</button><br>
    </div>

    <div class="col-sm-4">
        <button type="button">Emergency<br>112</button><br>
    </div>
    <div class="col-sm-4">
        <button type="button">Crime Stopper<br>1090</button><br>
    </div>
</div>
<button type="submit">Load More</button>
</body>
</html>
