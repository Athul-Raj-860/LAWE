<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add_Lawyer</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<h1>Lawyer Details</h1>
<div class="LawyerAdd">
    <form method="POST"  enctype="multipart/form-data" >
    {% csrf_token %}
        <label for="Name"> NAME:</label><br>
        <input type="text" name="Name" id="Name" placeholder="Enter  Name" size="20px" required><br><br>

        <label for="Email">Email:</label><br>
        <input type="email" name="Email" id="Email" placeholder="Enter Email" size="20px" required><br><br>

        <label for="Number">Number:</label><br>
        <input type="text" name="Number" id="Number" placeholder="Enter Number" size="20px" required><br><br>

        <label for="Experience">Experience</label><br>
        <input type="text" name="Experience" id="Experience" placeholder="Enter Experience" size="20px" required><br><br>

        <label for="Firm">Lawyer Firm:</label><br>
        <input type="text" name="Firm" id="Firm" placeholder="Enter the Firm Name " size="20px" required><br><br>

        <select id="Lawyer_Category" name="Lawyer_Category">
            <option value="">Select Lawyer Category</option>
             <option value="1">Criminal</option>
             <option value="2">Environmental</option>
             <option value="3">Family</option>
             <option value="4">Cyber</option>
             <option value="5">Civil</option>
        </select>

        <label for="Image">Upload Image:</label>
        <input type="file"  accept="image/*" name="Image" id="Image" required>
        <input type="text" id="Price" name="Price" placeholder="Enter Booking Amount">



        <button type="submit">Upload</button>
        </form>
    </div>
</body>
</body>
</html>
